name: Build aggregated domain list

on:
  push:
    paths:
      - 'domains/categories/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Aggregate domains
        run: |
          # Collect all domains from category files, strip comments and blanks, sort, deduplicate
          cat domains/categories/*.txt \
            | grep -v '^\s*#' \
            | grep -v '^\s*$' \
            | sort -u \
            > domains/kvas-aggregated.txt

          COUNT=$(wc -l < domains/kvas-aggregated.txt)
          echo "Total unique domains: $COUNT"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add domains/kvas-aggregated.txt
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "build: update aggregated domain list ($(wc -l < domains/kvas-aggregated.txt) domains)"
          git push
