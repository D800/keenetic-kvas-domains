name: Check upstream domain list changes

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download upstream list
        run: |
          curl -sL https://raw.githubusercontent.com/itdoginfo/allow-domains/main/Russia/inside-kvas.lst \
            -o /tmp/upstream.lst

      - name: Compare with local snapshot
        id: diff
        run: |
          # Sort both for comparison
          sort domains/inside-kvas.lst > /tmp/local-sorted.lst
          sort /tmp/upstream.lst > /tmp/upstream-sorted.lst

          # Find new domains (in upstream but not in local snapshot)
          ADDED=$(comm -13 /tmp/local-sorted.lst /tmp/upstream-sorted.lst)
          # Find removed domains (in local snapshot but not in upstream)
          REMOVED=$(comm -23 /tmp/local-sorted.lst /tmp/upstream-sorted.lst)

          # Also check which new upstream domains are NOT in our aggregated list
          if [ -f domains/kvas-aggregated.txt ]; then
            sort domains/kvas-aggregated.txt > /tmp/ours-sorted.lst
          else
            # fallback: aggregate from categories
            cat domains/categories/*.txt | grep -v '^\s*#' | grep -v '^\s*$' | sort -u > /tmp/ours-sorted.lst
          fi

          # New in upstream AND not in our list
          NEW_FOR_US=""
          if [ -n "$ADDED" ]; then
            NEW_FOR_US=$(echo "$ADDED" | while read d; do
              grep -qx "$d" /tmp/ours-sorted.lst || echo "$d"
            done)
          fi

          ADDED_COUNT=$(echo "$ADDED" | grep -c . || true)
          REMOVED_COUNT=$(echo "$REMOVED" | grep -c . || true)
          NEW_FOR_US_COUNT=$(echo "$NEW_FOR_US" | grep -c . || true)

          echo "added_count=$ADDED_COUNT" >> "$GITHUB_OUTPUT"
          echo "removed_count=$REMOVED_COUNT" >> "$GITHUB_OUTPUT"
          echo "new_for_us_count=$NEW_FOR_US_COUNT" >> "$GITHUB_OUTPUT"

          # Save for issue body
          {
            echo "ADDED<<EOFADDED"
            echo "$ADDED"
            echo "EOFADDED"
          } >> "$GITHUB_ENV"
          {
            echo "REMOVED<<EOFREMOVED"
            echo "$REMOVED"
            echo "EOFREMOVED"
          } >> "$GITHUB_ENV"
          {
            echo "NEW_FOR_US<<EOFNEW"
            echo "$NEW_FOR_US"
            echo "EOFNEW"
          } >> "$GITHUB_ENV"

          if [ "$ADDED_COUNT" = "0" ] && [ "$REMOVED_COUNT" = "0" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update local snapshot
        if: steps.diff.outputs.has_changes == 'true'
        run: |
          cp /tmp/upstream.lst domains/inside-kvas.lst

      - name: Create issue with diff
        if: steps.diff.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const added = process.env.ADDED.trim();
            const removed = process.env.REMOVED.trim();
            const newForUs = process.env.NEW_FOR_US.trim();
            const addedCount = '${{ steps.diff.outputs.added_count }}';
            const removedCount = '${{ steps.diff.outputs.removed_count }}';
            const newForUsCount = '${{ steps.diff.outputs.new_for_us_count }}';

            let body = `## Upstream changes detected (itdoginfo/allow-domains)\n\n`;
            body += `**Source:** [inside-kvas.lst](https://github.com/itdoginfo/allow-domains/blob/main/Russia/inside-kvas.lst)\n\n`;

            if (newForUs) {
              body += `### New domains not in our list (${newForUsCount})\n\n`;
              body += `These are in upstream but **not** in any of our category files:\n\n`;
              body += '```\n' + newForUs + '\n```\n\n';
              body += `To add, copy to the appropriate \`domains/categories/*.txt\` file.\n\n`;
            }

            if (added) {
              body += `<details><summary>All added upstream (+${addedCount})</summary>\n\n`;
              body += '```\n' + added + '\n```\n</details>\n\n';
            }

            if (removed) {
              body += `<details><summary>Removed upstream (-${removedCount})</summary>\n\n`;
              body += '```\n' + removed + '\n```\n</details>\n\n';
            }

            body += `---\n*Local snapshot \`domains/inside-kvas.lst\` has been updated in this run.*`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Upstream domain list changes: +${addedCount} / -${removedCount}`,
              body: body,
              labels: ['upstream-sync']
            });

      - name: Commit updated snapshot
        if: steps.diff.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add domains/inside-kvas.lst
          git commit -m "chore: update upstream snapshot inside-kvas.lst"
          git push
